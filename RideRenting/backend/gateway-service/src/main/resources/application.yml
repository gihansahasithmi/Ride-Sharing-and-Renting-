server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PATCH
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: bike-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/bikes/**
        - id: rental-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/rentals/**
        - id: admin-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/admin/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
